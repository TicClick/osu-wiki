name: Post-merge outdate processing

on:
  push:
    branches:
      - master
    paths:
      - '**.md'
  pull_request:
    types: [closed]
    branches: [master]

jobs:
  process-outdated-files:
    name: Process outdated files after merge
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true || (github.event.pull_request.merged != true && github.ref == 'refs/heads/master')

    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          cache: pip
          cache-dependency-path: requirements.txt
          python-version: "3.11"

      - name: Read DO_NOT_OUTDATE rules
        id: read-rules
        if: github.event.pull_request.merged == true
        env:
          IS_PR_MERGED: github.event.pull_request.merged == true
          IS_DIRECT_COMMIT_TO_MASTER: github.event.pull_request.merged != true && github.ref == 'refs/heads/master'
          MAYBE_PULL_REQUEST_BODY: github.event.pull_request?.body? || ''
        run: |
            exclude_args=$( python -c <<EOF

            import os
            import re
            import sys

            DO_NOT_OUTDATE_RE = re.compile("DO_NOT_OUTDATE:\s*(.+?)(?=\n|$)")

            def main():
                body = os.environ["MAYBE_PULL_REQUEST_BODY"]
                for match in DO_NOT_OUTDATE_RE.findall(body):
                    for split in match.split(","):
                        print("--exclude={}".format(split.strip()))

            if __name__ == "__main__":
                main()

            EOF )
          
            echo "exclude_args=$exclude_args" >> GITHUB_OUTPUT

      - name: Set up Python CI dependencies
        run: pip install git+https://github.com/TicClick/osu-wiki-tools.git@exclude-outdated-paths

      - name: Run osu-wiki-tools with excludes
        run: |
          exclude_args="${{ steps.read-rules.outputs.exclude_args }}"
          if [ -n "$exclude_args" ]; then
            osu-wiki-tools check-outdated-articles --autofix --base-commit "${{ github.sha }}~1" --outdated-since ${{ github.sha }} $exclude_args
          else
            osu-wiki-tools check-outdated-articles --autofix --base-commit "${{ github.sha }}~1" --outdated-since ${{ github.sha }} 
          fi

      - name: Commit and push changes
        if: (steps.read-rules.outputs.exclude_args || '') != ''
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: |
            Mark translations as outdated after PR #${{ github.event.pull_request.number }} merge
            
            Auto-generated by post-merge workflow
          branch: master
          commit_user_name: 'github-actions[bot]'
          commit_user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_author: 'github-actions[bot] <github-actions[bot]@users.noreply.github.com>'

      - name: Create summary
        run: |
          echo "## Post-merge processing completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
            exclude_rules="${{ steps.read-rules.outputs.exclude_args }}"
            if [ -n "$exclude_args" ]; then
              echo "**Exclude rules applied:**" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              echo "$exclude_rules" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
            else
              echo "**Status:** No exclude rules found, processed all changed files" >> $GITHUB_STEP_SUMMARY
            fi
          fi
